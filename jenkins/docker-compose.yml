services:
  jenkins:
    image: ${JENKINS_IMAGE:-ghcr.io/OWNER/REPOSITORY/jenkins:latest}
    container_name: soma-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-change-me}
      JENKINS_URL: ${JENKINS_URL:-http://localhost:8080/}
      STAGE_HOST: ${STAGE_HOST:-stage.example.com}
      OPERATION_HOST: ${OPERATION_HOST:-operation.example.com}
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
